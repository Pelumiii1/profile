<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Profile card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
    
    <div id="container">
      <img src="/images/image-victor.jpg" alt="" class="pic">
      <div class="white-bg">
        <img src="/images/bg-pattern-card.svg" alt="" class="blue-bg">
        <div class="content">
          <div class="name">
            <h1>Victor Crest <span class="gray-font">26</span> </h1>
          </div>
          <div class="location">
            <p>London</p>
          </div>
          <div class="b"></div>
          <div class="details">
            <div class="follows">
              <p>80K<br>
                <span class="gray-font">Followers</span> </p>
            </div>
            <div class="likes">
              <p>803K<br>
               <span class="gray-font">Likes</span> </p>
            </div>
            <div class="photos">
              <p>1.4K<br>
                <span class="gray-font">Photos</span> </p>
            </div>
          </div>
        </div>
      </div>
    </div>
</body>
</html>
